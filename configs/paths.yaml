# StockM v1.0 — filesystem paths (single source of truth)
# All modules resolve paths through this file. Nothing is hard-coded.

data:
  raw: data/raw
  interim: data/interim
  processed: data/processed
  external: data/external
  validation: data/validation
  backups: data/backups

models:
