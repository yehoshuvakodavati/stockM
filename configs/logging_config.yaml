# StockM v1.0 — logging configuration

version: 1
disable_existing_loggers: false

# ── Formatters ──────────────────────────────────────────────
formatters:
  json:
    format: structured
    (): structlog.stdlib.ProcessorFormatter
  console:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

# ── Handlers ────────────────────────────────────────────────
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: console
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/stockM.log
    maxBytes: 10485760            # 10 MB
    backupCount: 5

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: json
    filename: logs/stockM_errors.log
    maxBytes: 10485760
    backupCount: 5

# ── Loggers ─────────────────────────────────────────────────
loggers:
  stockM:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  stockM.data:
    level: INFO
  stockM.training:
    level: INFO
  stockM.api:
    level: INFO

# ── Root ────────────────────────────────────────────────────
root:
  level: WARNING
  handlers: [console]
