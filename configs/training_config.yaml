# StockM v1.0 — training configuration

run:
  experiment_name: stockM_v1_ohlcv
  run_name: auto                   # auto = timestamped
  tags:
    version: "1.0"
    scope: ohlcv

trainer:
  type: sequence                    # sequence | tabular
  device: auto                      # auto | cpu | cuda
  mixed_precision: false

optimization:
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0001
  momentum: 0.9                     # for SGD
  lr_scheduler: reduce_on_plateau
  scheduler_params:
    factor: 0.5
    patience: 5

loop:
  epochs: 50
  batch_size: 64
  eval_every_n_epochs: 1
  gradient_clip_norm: 1.0

# ── Early stopping & checkpointing ──────────────────────────
early_stopping:
  enabled: true
  monitor: val_loss
  mode: min
  patience: 10
  min_delta: 0.0001

checkpoints:
  save_dir: models/checkpoints
  save_top_k: 3
  monitor: val_loss
  mode: min
  save_last: true

# ── Hyperparameter tuning ──────────────────────────────────
tuning:
  enabled: false                    # enable for search runs
  engine: optuna
  n_trials: 50
  search_space:
    learning_rate: [0.0001, 0.01]
    hidden_size: [32, 64, 128]
    dropout: [0.1, 0.5]
    batch_size: [32, 64, 128]
  pruning: median
