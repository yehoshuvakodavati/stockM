# StockM v1.0 — feature engineering configuration
# Plugin pattern: only groups listed under `active` are computed.
# Future versions add groups here without touching pipeline code.

# ── Active feature groups (computed for this run) ───────────
active_groups:
  - ohlcv                        # v1 — required
  # - technical                   # v2 — technical indicators
  # - fundamental                 # v3 — fundamentals
  # - text_nlp                    # v4 — news & NLP embeddings
  # - macro                       # v5 — macro & global events
  # - graph                       # v6 — relationship knowledge graph

# ── Per-group settings ───────────────────────────────────────
# The `ohlcv` block is the single source of truth for the v1 feature
# parameters. Every value here is read by FeatureEngine and passed to the
# corresponding feature family. Missing keys fall back to in-code defaults,
# so this file can grow incrementally without breaking runs.
ohlcv:
  # Price / returns
  price_col: Adj Close             # canonical adjusted price series

  # Trend (Lesson 4)
  sma_windows: [5, 10, 20, 50, 100, 200]
  ema_windows: [5, 10, 20, 50]

  # Momentum (Lesson 5)
  rsi_window: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  roc_periods: [5, 10, 20]
  momentum_periods: [5, 10, 20]

  # Volatility (Lesson 6)
  volatility_window: 20            # rolling std of returns
  atr_window: 14
  bb_window: 20
  bb_std: 2.0
  hv_window: 21                    # historical volatility (annualised)

  # Volume (Lesson 7)
  vma_windows: [5, 10, 20]
  vol_momentum_fast: 5
  vol_momentum_slow: 20

  # Lags (Lesson 9)
  lag_periods: [1, 3, 5, 10, 20]

  # Rolling windows (Lesson 10)
  rolling_windows: [5, 10, 20]

  # Targets (Lesson 11)
  direction_threshold: 0.0         # binary UP/DOWN cutoff on next-day return
  signal_threshold: 0.01           # |return| separating Buy/Sell from Hold

  # Missing-value handling (Lesson 12)
  # "drop" is the leak-safe default: warmup rows + future-edge rows are removed.
  # "ffill" forward-fills features only (never targets) then drops the tail.
  missing_strategy: drop

  # Validation (Lesson 13)
  corr_threshold: 0.95             # |Pearson r| above which a pair is flagged

technical:                        # v2 (currently inactive)
  indicators: [rsi, macd, bollinger, atr]
  windows: [7, 14, 21]

fundamental:                      # v3 (placeholder)
  metrics: [pe_ratio, debt_to_equity, roe]

text_nlp:                         # v4 (placeholder)
  embedding_model: local
  sources: [earnings_calls, news]

macro:                            # v5 (placeholder)
  indicators: [cpi, fed_rate, vix]

graph:                           # v6 (placeholder)
  relation_types: [supplier, customer, competitor]

# ── Common windowing / preprocessing ───────────────────────
windowing:
  lookback_window: 30            # sequence length fed to models
  horizon: 1                      # prediction horizon in days

scaling:
  method: standard                # standard | minmax | robust
  fit_on: train_only              # prevents leakage

selection:
  enabled: false                 # enable when feature count grows
  method: mutual_information
  top_k: 50
