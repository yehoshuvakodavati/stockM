# StockM v1.0 — supplementary tool config
# Most config lives in pyproject.toml. This file holds settings for tools
# that do not yet support pyproject.toml-based configuration.

[flake8]
max-line-length = 100
extend-ignore = E203, W503
exclude =
    .git,
    .venv,
    __pycache__,
    build,
    dist,
    data,
    models,
    experiments
per-file-ignores =
    __init__.py:F401
    tests/*:E501
